<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Bobina Atlas</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<meta name="theme-color" content="#0077ff">
</head>
<body>

<!-- TELA DE PRIMEIRO ACESSO -->
<div id="welcomeScreen" class="welcomeScreen">
    <h2>Bem-vindo! Primeiro acesso</h2>
    <label>Digite seu nome:</label><br>
    <input type="text" id="nomeUsuarioInput" placeholder="Seu nome"><br><br>
    <label>Escolha o idioma:</label><br>
    <select id="idiomaSelect">
        <option value="pt">Português</option>
        <option value="en">English</option>
        <option value="hi">Hindi</option>
    </select><br><br>
    <button id="entrarBtn">Entrar</button>
</div>

<!-- PAINEL PRINCIPAL -->
<div id="mainPanel" class="mainPanel" style="display:none;">

<h2 id="tituloPrograma">Calculadora de Bobina</h2>

<div id="saudacao" class="saudacao"></div>

<label id="labelLargura">Largura da bobina externa (cm)</label><br>
<select id="largura"></select><br><br>

<label id="labelEspessura">Espessura da chapa (mm)</label><br>
<div id="espessuras" class="btnGroup"></div><br>

<label id="labelVelocidade">Velocidade da máquina (m/min)</label><br>
<div id="velocidades" class="btnGroup"></div><br>

<div id="resultado">
    <h3 id="passos"></h3>
    <h3 id="metros"></h3>
    <h3 id="tempo"></h3>
    <h3 id="hora"></h3>
</div>

<!-- Botão de trocar usuário no final -->
<button id="resetUser">Trocar usuário</button>

<script src="script.js"></script>
</div>
</body>
</html>
