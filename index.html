<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas - Controle de Produção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="mainPanel" class="mainPanel">
    <button id="btnParadaGeral" class="emergency-btn">🛑 PARAR MÁQUINA</button>

    <div class="config-box">
        <label>Nova Bobina:</label>
        <select id="selecaoBobina">
            <option value="1">Bobina 1</option>
            <option value="2">Bobina 2</option>
            <option value="3">Bobina 3</option>
            <option value="4">Bobina 4</option>
        </select>

        <label>Largura (cm):</label>
        <select id="largura"></select>

        <label>Espessura (mm):</label>
        <div id="espessuras" class="btnGroup"></div>

        <label>Velocidade (m/min):</label>
        <div id="velocidades" class="btnGroup"></div>

        <button id="confirmarBtn">ADICIONAR À LINHA</button>
    </div>

    <div id="containerBobinas" class="grid-bobinas"></div>
</div>

<script src="script.js"></script>
</body>
</html>
